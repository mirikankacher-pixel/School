<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>1bsef3 | Mehdi Ben Berka</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <div class="bg-abstract"></div>

  <div id="login-screen" class="screen active login-flex">
    <div class="login-card glass">
      <h1>1bsef3</h1>
      <p>Mehdi Ben Berka</p>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="auth-code" placeholder="Enter Access Code">
      </div>
      <p id="login-error" class="error-msg">Invalid access code.</p>
      <button onclick="app.login()" class="btn-primary">Enter Dashboard</button>
    </div>
  </div>

  <div id="main-app" class="screen">
    <header class="glass-header">
      <div class="header-info">
        <h2>1bsef3</h2>
        <p>Mehdi Ben Berka</p>
      </div>
      <div class="header-actions">
        <div class="welcome-text">Hi, <span id="user-name"></span></div>
        <div class="menu-container">
          <button class="icon-btn" onclick="app.toggleMenu()">
            <i class="fas fa-ellipsis-v"></i>
          </button>
          <div class="dropdown-menu glass" id="dropdown">
            <div class="menu-item" onclick="app.navigate('schedule')">Schedule</div>
            <div class="menu-item" onclick="app.navigate('exams')">Exams</div>
            <div class="menu-item" onclick="app.navigate('homework')">Homework</div>
            <div class="menu-item" onclick="app.navigate('teachers')">Absences</div>
            <div class="menu-item admin-only" onclick="app.navigate('students')">Student Directory</div>
            <hr>
            <div class="menu-item text-red" onclick="app.logout()">Logout</div>
          </div>
        </div>
      </div>
    </header>

    <div id="admin-panel" class="admin-bar glass hidden">
      <span><i class="fas fa-user-shield"></i> Admin Mode</span>
    </div>

    <main class="content-area">
      <div id="view-schedule" class="view hidden">
        <div class="view-header">
          <h3>Week Schedule</h3>
        </div>
        <div class="table-responsive">
          <table class="schedule-table glass">
            <tbody id="schedule-body"></tbody>
          </table>
        </div>
      </div>

      <div id="view-exams" class="view hidden">
        <div class="view-header">
          <h3>Exams</h3>
          <button class="btn-outline admin-only" onclick="app.addExam()">+ Add Exam</button>
        </div>
        <div class="grid-cards" id="exams-container"></div>
      </div>

      <div id="view-homework" class="view hidden">
        <div class="view-header">
          <h3>Homework</h3>
          <button class="btn-outline admin-only" onclick="app.addHomework()">+ Add Homework</button>
        </div>
        <div class="grid-cards" id="homework-container"></div>
      </div>

      <div id="view-teachers" class="view hidden">
        <div class="view-header">
          <h3>Teacher Absences</h3>
          <button class="btn-outline admin-only" onclick="app.addAbsence()">+ Report</button>
        </div>
        <div class="grid-cards" id="teachers-container"></div>
      </div>

      <div id="view-students" class="view hidden">
        <div class="view-header">
          <h3>Student Directory</h3>
          <button class="btn-outline admin-only" onclick="app.addStudent()">+ New Student</button>
        </div>
        <div class="table-responsive">
          <table class="schedule-table glass">
            <thead>
              <tr>
                <th>Name</th>
                <th>Code</th>
                <th>Role</th>
                <th>Last Login</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="student-list-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="action-modal" class="screen login-flex" style="background: rgba(0,0,0,0.8); z-index: 2000; position: fixed; inset: 0;">
    <div class="login-card glass" style="max-width: 450px;">
      <h2 id="modal-title" style="margin-bottom: 20px;">Add Item</h2>

      <div class="input-group" id="group-subject">
        <select id="input-subject" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white; outline: none;">
          <option value="" disabled selected>Select Subject</option>
          <option value="Math">Math</option>
          <option value="SVT">SVT</option>
          <option value="Physics">Physics</option>
          <option value="Français">Français</option>
          <option value="Arab">Arab</option>
          <option value="Sport">Sport</option>
          <option value="English">English</option>
          <option value="Philosophie">Philosophie</option>
          <option value="اجتماعيات">اجتماعيات</option>
          <option value="اسلاميات">اسلاميات</option>
        </select>
      </div>

      <div class="input-group hidden" id="group-teacher">
        <input type="text" id="input-teacher" placeholder="Teacher Name">
      </div>

      <div class="input-group" id="group-date">
        <input type="datetime-local" id="input-date" style="color: white; color-scheme: dark;">
      </div>

      <div class="input-group" id="group-desc">
        <input type="text" id="input-desc" placeholder="Description / Details">
      </div>

      <div class="input-group hidden" id="group-state">
        <select id="input-state" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
          <option value="confirmed">Confirmed</option>
          <option value="very_possible">Very Possible</option>
          <option value="possible">Possible</option>
        </select>
      </div>

      <div class="input-group hidden" id="group-dates-absence">
        <p style="margin-bottom: 10px; color: var(--text-muted); font-size: 0.85rem; text-align: left;">Select Days of Absence:</p>
        <div class="checkbox-grid">
          <label><input type="checkbox" value="Mon" class="day-cb"> Mon</label>
          <label><input type="checkbox" value="Tue" class="day-cb"> Tue</label>
          <label><input type="checkbox" value="Wed" class="day-cb"> Wed</label>
          <label><input type="checkbox" value="Thu" class="day-cb"> Thu</label>
          <label><input type="checkbox" value="Fri" class="day-cb"> Fri</label>
          <label><input type="checkbox" value="Sat" class="day-cb"> Sat</label>
        </div>
        <input type="text" id="input-absence-custom" placeholder="Or specify a date (e.g. 15/03)" style="margin-top: 10px;">
      </div>

      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button onclick="app.closeModal()" class="btn-primary" style="background: #333; color: white;">Cancel</button>
        <button onclick="app.submitModal()" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
  <script src="script.js"></script>
</body>

</html>
